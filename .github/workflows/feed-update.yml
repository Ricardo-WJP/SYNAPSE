# SYNAPSE · 触点 - Daily Feed Update Workflow
# Updates design and AI articles from RSS feeds daily at 8:00 AM UTC

name: Daily Feed Update

on:
  schedule:
    # Run every hour (Beijing time: every hour, e.g., 9:00, 10:00, 11:00...)
    - cron: "0 * * * *"
    # Also keep the twice daily for full updates
    - cron: "0 0 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allow manual trigger for testing

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger Feed Update
        run: |
          curl -X POST '${{ secrets.API_BASE }}/api/feed' \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ${{ secrets.FEED_UPDATE_TOKEN }}' \
            --max-time 300