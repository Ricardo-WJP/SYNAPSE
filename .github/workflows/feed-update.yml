# SYNAPSE · 触点 - Daily Feed Update Workflow
# Direct Node.js script execution - bypasses Vercel Serverless timeout

name: Daily Feed Update

on:
  schedule:
    # Run every hour (Beijing time)
    - cron: "0 * * * *"
  workflow_dispatch:
    # Allow manual trigger for testing

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run content update script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.API_BASE }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.FEED_UPDATE_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: node scripts/content-update.mjs --skip-ai